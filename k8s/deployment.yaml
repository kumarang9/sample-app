apiVersion: apps/v1
kind: Deployment

metadata:
  name: sample-app
  namespace: prod

spec:
  replicas: 2

  selector:
    matchLabels:
      app: sample-app

  template:
    metadata:
      labels:
        app: sample-app

    spec:
      containers:
      - name: sample-app
        image: 833082650443.dkr.ecr.ap-south-1.amazonaws.com/sample-python-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000